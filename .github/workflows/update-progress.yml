name: Update Progress Badge

on:
  push:
    paths:
      - 'progress.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Progress SVG
        run: |
          python3 << 'PYEOF'
          import json
          with open('progress.json') as f:
              c = json.load(f)
          done, total = c['done'], c['total']
          pct = round((done/total)*100, 1)
          width = (done/total)*480
          svg = '<svg xmlns="http://www.w3.org/2000/svg" width="500" height="80" viewBox="0 0 500 80">'
          svg += '<defs>'
          svg += '<linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#FFD700"/><stop offset="50%" stop-color="#FFA500"/><stop offset="100%" stop-color="#FF6B35"/></linearGradient>'
          svg += '<linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0f0f1a"/></linearGradient>'
          svg += '</defs>'
          svg += '<rect x="10" y="20" width="480" height="40" rx="20" fill="url(#bgGrad)" stroke="#333" stroke-width="2"/>'
          svg += f'<rect x="10" y="20" width="{width}" height="40" rx="20" fill="url(#goldGrad)"/>'
          svg += f'<rect x="10" y="20" width="{width}" height="20" rx="20" fill="rgba(255,255,255,0.15)"/>'
          svg += '<circle cx="50" cy="35" r="4" fill="rgba(255,255,255,0.6)"/><circle cx="50" cy="35" r="2" fill="rgba(255,255,255,0.9)"/>'
          svg += '<circle cx="120" cy="42" r="3" fill="rgba(255,255,255,0.5)"/><circle cx="120" cy="42" r="1.5" fill="rgba(255,255,255,0.8)"/>'
          svg += '<circle cx="200" cy="30" r="5" fill="rgba(255,255,255,0.4)"/><circle cx="200" cy="30" r="2" fill="rgba(255,255,255,0.7)"/>'
          svg += '<circle cx="280" cy="38" r="3.5" fill="rgba(255,255,255,0.5)"/><circle cx="280" cy="38" r="1.5" fill="rgba(255,255,255,0.8)"/>'
          svg += f'<text x="250" y="47" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">{pct}%</text>'
          svg += f'<text x="250" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#888">{done} / {total} textures</text>'
          svg += '</svg>'
          with open('progress.svg', 'w') as f:
              f.write(svg)
          print(f'Updated: {done}/{total} = {pct}%')
          PYEOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress.svg
          git diff --cached --quiet || git commit -m "Update progress badge"
          git push
