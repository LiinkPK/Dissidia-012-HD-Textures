name: Update Progress Badge

on:
  push:
    paths:
      - 'progress.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Progress SVG
        run: |
          python3 << 'EOF'
          import json

          with open('progress.json', 'r') as f:
              config = json.load(f)

          done = config['done']
          total = config['total']
          percentage = round((done / total) * 100, 1)
          bar_width = (percentage / 100) * 480

          svg = f"""<<svg xmlns="http://www.w3.org/2000/svg" width="500" height="80" viewBox="0 0 500 80">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <rect x="10" y="20" width="480" height="40" rx="20" fill="url(#bgGrad)" stroke="#333" stroke-width="2"/>
  <rect x="10" y="20" width="{bar_width}" height="40" rx="20" fill="url(#goldGrad)"/>
  <rect x="10" y="20" width="{bar_width}" height="20" rx="20" fill="rgba(255,255,255,0.15)"/>
  
  <circle cx="50" cy="35" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="50" cy="35" r="2" fill="rgba(255,255,255,0.9)"/>
  <circle cx="120" cy="42" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="120" cy="42" r="1.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="200" cy="30" r="5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="200" cy="30" r="2" fill="rgba(255,255,255,0.7)"/>
  <circle cx="280" cy="38" r="3.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="280" cy="38" r="1.5" fill="rgba(255,255,255,0.8)"/>

  <text x="250" y="47" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">{percentage}%</text>
  <text x="250" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#888">{done:,} / {total:,} textures</text>
</svg>"""

          with open('progress.svg', 'w') as f:
              f.write(svg)

          print(f"Updated: {done}/{total} = {percentage}%")
          EOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress.svg
          git diff --cached --quiet || git commit -m "Update progress badge: $(python3 -c "import json; d=json.load(open('progress.json')); print(f\"{d['done']}/{d['total']}\")")"
          git push
